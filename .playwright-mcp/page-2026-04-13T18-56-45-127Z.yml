                - generic [ref=e53]: IT Project Manager in Implementation Services (m/w/d)
                - generic [ref=e54]: Kirchdorf/Oberopfingen
              - generic [ref=e56]:
                - paragraph [ref=e57]: "Bei der Liebherr-IT Services GmbH legen wir Wert auf die Entfaltung individueller und unternehmerischer Bedürfnisse und leben daher das Flex Office: Wir arbeiten im hybriden Modell bei flexiblen Arbeitszeiten – sowohl vor Ort als auch mobil."
                - heading "Das sind Ihre Aufgaben" [level=2] [ref=e58]
                - paragraph [ref=e59]: Projektmanagement & Verantwortung
                - list [ref=e60]:
                  - listitem [ref=e61]: – Eigenständige Leitung und Steuerung komplexer IT-Implementierungsprojekte mit strategischer Relevanz
                  - listitem [ref=e62]: – Verantwortung für Budget, Zeitplan, Qualität und Stakeholder-Management
                  - listitem [ref=e63]: – Steuerung interner und externer Projektteams in einem internationalen Umfeld
                  - listitem [ref=e64]: – Enge Zusammenarbeit mit Fachbereichen und IT-Expert:innen
                  - listitem [ref=e65]: – Koordination von Projekten, die mehrere Gesellschaften und Unternehmensbereiche betreffen
                  - listitem [ref=e66]: – Management von Projekten mit hoher technischer Tiefe und organisatorischer Komplexität
                - paragraph [ref=e67]: Typische Themenfelder (beispielhaft)
                - list [ref=e68]:
                  - listitem [ref=e69]: – Einführung und Integration von Cloud-Applikationen
                  - listitem [ref=e70]: – Implementierung von Business Support Solutions & Enterprise Service Management
                  - listitem [ref=e71]: – Datenmanagement & Integrationsplattformen
                  - listitem [ref=e72]: – HR- und Learning-Applikationen
                  - listitem [ref=e73]: – IT-Infrastrukturprojekte
                - heading "Das bringen Sie mit" [level=2] [ref=e74]
                - list [ref=e75]:
                  - listitem [ref=e76]: – Abgeschlossenes Studium im Bereich Informatik, Wirtschaftsinformatik oder vergleichbare Qualifikation
                  - listitem [ref=e77]: – Mehrjährige Erfahrung im Projektmanagement, idealerweise im IT-Infrastruktur-Umfeld
                  - listitem [ref=e78]: – Erfahrung mit komplexen IT-Projekten und der Koordination von interdisziplinären Teams
                  - listitem [ref=e79]: – Ausgeprägte Kommunikations- und Organisationsfähigkeiten
                  - listitem [ref=e80]: – Verhandlungssichere Englischkenntnisse in Wort und Schrift
                - heading "Das bieten wir Ihnen" [level=2] [ref=e81]
                - paragraph [ref=e82]: "Die Firmengruppe Liebherr bietet Ihnen als international erfolgreiches Familienunternehmen einen sicheren Arbeitsplatz, eine einzigartige Vielfalt an Aufgaben und spannende Entwicklungsmöglichkeiten. Werden Sie noch heute Teil unseres starken Teams und lernen Sie die Firmengruppe Liebherr als zuverlässigen Partner kennen. Profitieren Sie von diesen Benefits:"
                - list [ref=e83]:
                  - listitem [ref=e84]: – Attraktive Vergütung und Sozialleistungen
                  - listitem [ref=e85]: – Flexibles und mobiles Arbeiten
                  - listitem [ref=e86]: – Freiräume für kreatives Arbeiten
                  - listitem [ref=e87]: – Krisensicherer Arbeitsplatz
                  - listitem [ref=e88]: – Individuelle Entwicklungs- und Weiterbildungsmöglichkeiten
                  - listitem [ref=e89]: – Mitarbeitervorteile & Rabatte
                  - listitem [ref=e90]: – Gesunde & regionale Verpflegung im Betriebsrestaurant
                  - listitem [ref=e91]: – Betriebliches Gesundheitsmanagement
                  - listitem [ref=e92]: – E-Gym-Wellpass
                - paragraph [ref=e93]:
                  - text: "Machen Sie sich Ihr eigenes Bild von unserem Standort Oberopfingen:"
                  - link "Liebherr - Imagefilm Standort Oberopfingen - YouTube" [ref=e94] [cursor=pointer]:
                    - /url: https://www.youtube.com/watch?v=CriM8oAD4G4
                  - text: "und finden Sie Ihr perfektes Match in unserem Familienunternehmen:"
                  - link "Liebherr - Finde dein perfektes Match! (youtube.com)" [ref=e95] [cursor=pointer]:
                    - /url: https://www.youtube.com/watch?v=JvlAzpFl8I8&list=PLRWbihl-JTGWHZJVxWIG2FnqNcpAaZUtd&index=5
                - paragraph [ref=e96]: Bitte nutzen Sie ausschließlich die Möglichkeit zur Online-Bewerbung.
                - paragraph [ref=e97]: Haben wir Ihr Interesse geweckt? Dann freuen wir uns über Ihre Online-Bewerbung. Bei Fragen kontaktieren Sie bitte Ümit Arici.
