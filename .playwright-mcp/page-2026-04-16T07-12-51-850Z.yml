            - generic [ref=e48]:
              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: Als IT Manager:in arbeitest Du gemeinsam mit erfahrenen, hochmotivierten Kolleg:innen, die leidenschaftlich gerne Technologie verbessern. Unsere Manager:innen arbeiten proaktiv daran, sicherzustellen, dass wir jederzeit über die optimale IT-Infrastruktur verfügen. Du trägst die Verantwortung dafür, Innovationen voranzutreiben, die die Erlebnisse aller Beteiligten tragen – Kund:innen ebenso wie Kolleg:innen. Im Großen und Ganzen sorgst Du dafür, dass unsere Systeme effizient, schnell und einfach funktionieren. Du unterstützt unter anderem Dein Team bei der Verbesserung von Betriebsprozessen mithilfe neuer Hardware, der Automatisierung manueller Prozesse und dem Hinterfragen von Lösungen, um die besten Optionen für das Unternehmen zu finden. Du koordinierst andere und hilfst, ein dynamisches und positives Arbeitsumfeld zu schaffen.
                - text: Key job responsibilities
                - text: • Projektkonzeption und -management,
                - text: einschließlich für neu eingeführte Technologien
                - text: sowie Lebenszyklus- und interne Programme
                - text: • Management und Bereitstellung von Lösungen
                - text: für Probleme in der IT-Infrastruktur,
                - text: beispielsweise in lokalen Standortnetzwerken,
                - text: Servern und Hardware
                - text: • Unterstützung des Teams durch eine Reihe
                - text: unterschiedlicher Maßnahmen, darunter die
                - text: Verbesserung betrieblicher Prozesse,
                - text: Automatisierung manueller Aufgaben und
                - text: Analyse von Lösungen
                - text: • Einsatz und Wartung von IT-Lösungen und
                - text: Fehlerbehebung während ihres gesamten
                - text: Lebenszyklus
                - text: • Projektmanagement von Programmen für die
                - text: Prozessautomatisierung und zum Ausprobieren
                - text: bzw. Einführen neuer Technologien
                - text: •Management und Entwicklung von
                - text: standortbasierten Supportteams und Anwerbung
                - text: neuer Talente
                - text: A day in the life
                - text: Als IT Manager:in trägst Du die Verantwortung für mehrere Standorte und arbeitest in unterschiedlichen Umgebungen. In dieser Rolle gleicht kein Tag dem anderen. Du kümmerst dich um die Wartung der IT-Infrastruktur vor Ort, damit alles reibungslos funktioniert und die Standorte ihre optimale Leistung erbringen können. Du verfolgst einen datengesteuerten Ansatz, um Kosteneinsparungsmöglichkeiten zu entdecken, die Automatisierung zu erhöhen und zu diesen Zwecken verschiedene Technologien auszuprobieren.
                - text: Du unterstehst direkt dem/der Regional IT Manager:in. Du betreust Support-Teams für die Standorte, koordinierst Änderungen und neu eingeführte Technologien und managst Risiken. Dies ist eine kollaborative Rolle, in der Du mit Standortleiter:innen zusammenarbeitest und die Mitglieder Deines Teams bei Ihrer beruflichen Entwicklung unterstützt.
                - text: About the team
                - text: Mit der Erfüllung unserer Kundenbestellungen (Customer Fulfillment oder CF) fing für Amazon alles an. Das Customer Fulfillment Team hat sich mittlerweile von einem Team von Buchhändler:innen hin zu einem hocherfahrenen globalen Team gewandelt, das täglich mehr als 1,5 Millionen Bestellungen bearbeitet. Das Team bildet die Grundlage unseres Geschäfts und hat uns bei der Verbreiterung in neue Regionen und Dienstleistungen geholfen. Mithilfe aufkommender Technologie sind wir stetig auf der Suche nach Möglichkeiten, eine größere und bessere Produktauswahl anzubieten – die schnell und erschwinglich geliefert wird. Die CF-Teammitglieder sorgen als allererste dafür, dass unsere Kund:innen ihre Bestellungen mit der Geschwindigkeit erhalten, für die wir bekannt sind. Wir arbeiten in Fulfillment-Centern, die das Herzstück von Amazons dynamischem Betriebsnetz bilden. Unsere Fullfilment-Center werden manchmal auch als die „erste Meile“ (First Mile) bezeichnet – hier starten die meisten Amazon-Pakete ihren Versandweg. Wir unterstützen die Verwaltung eines dynamischen Bestands und ermöglichen schnelle Zustellungen rund um die Uhr. In unseren Fulfillment-Centern sind vielfältige Mitarbeitergruppen beschäftigt. Es gibt zahlreiche Möglichkeiten für Menschen mit den verschiedensten Fähigkeiten. Einige von uns arbeiten mit physischen Produkten. Andere analysieren Daten und helfen unternehmensweit dabei, intelligente Entscheidungen zu treffen.
