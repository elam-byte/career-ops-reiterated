              - heading "IT Domain Architect im Bereich Governance Administration (m/w/d) Lindenberg" [level=1] [ref=e52]:
                - generic [ref=e53]: IT Domain Architect im Bereich Governance Administration (m/w/d)
                - generic [ref=e54]: Lindenberg
              - generic [ref=e56]:
                - 'heading "Faszinierendes schaffen: Ihre Aufgaben" [level=2] [ref=e57]'
                - list [ref=e58]:
                  - listitem [ref=e59]: – Weiterentwicklung der zugewiesenen Domänen in Abstimmung mit der Unternehmens- und IT-Strategie
                  - listitem [ref=e60]: – Etablierung und Rollout von Enterprise Architecture Management (EAM) innerhalb der Organisation – mit Fokus auf die Domäne
                  - listitem [ref=e61]: – Zusammenarbeit mit Enterprise, Domain und Solution Architects innerhalb der Gesellschaften, Sparte und Gruppe
                  - listitem [ref=e62]: – Analyse des Reifegrads der Domäne, Identifikation von Harmonisierungspotenzialen und strategischen Handlungsfeldern sowie Definition einer Zielarchitektur und Dokumentation im EAM Tool
                  - listitem [ref=e63]: – Methodische Unterstützung und Beratung der Solution Architects bei Architekturfragen
                  - listitem [ref=e64]: – Erstellung und Bewertung von Architekturkonzepten (Business, Data, Application, Technology)
                  - listitem [ref=e65]: – Übernahme der Rolle des IT-Demand Managers für die Domäne (Anforderungsaufnahme bis Übergabe an PMO)
                  - listitem [ref=e66]: – Reisebereitschaft (gelegentliche Dienstreisen)
                - 'heading "Stärken einbringen: Ihre Qualifikationen" [level=2] [ref=e67]'
                - list [ref=e68]:
                  - listitem [ref=e69]: – Abgeschlossenes Studium der (Wirtschafts-)Informatik, Wirtschaftsingenieurwesen, Betriebswirtschaft oder vergleichbare Qualifikation
                  - listitem [ref=e70]: – Erfahrung als Domain Architect, Solution Architect/ Berater oder Business Analyst
                  - listitem [ref=e71]: – Erfahrung in Projektumsetzung
                  - listitem [ref=e72]: – Analytische Fähigkeiten und Problemlösungskompetenz
                  - listitem [ref=e73]: – Lösungsorientierte und pragmatische Arbeitsweise
                  - listitem [ref=e74]: – Sehr gute Deutsch- und Englischkenntnisse mit ausgeprägter Kommunikationsfähigkeit in beiden Sprachen
                - 'heading "Freiraum nutzen: Ihre Vorteile" [level=2] [ref=e75]'
                - list [ref=e76]:
                  - listitem [ref=e77]: – Sicherer Arbeitsplatz in einer erfolgreichen Firmengruppe
                  - listitem [ref=e78]: – Sozialleistungen eines modernen Unternehmens
                  - listitem [ref=e79]: – Faire, leistungsgerechte Vergütung plus Weihnachts- und Urlaubsgeld
                  - listitem [ref=e80]: – Gute Work-Life-Balance – mit 30 Tagen Urlaub, flexiblen Arbeitszeiten bis hin zur Möglichkeit, mobil zu arbeiten
                  - listitem [ref=e81]: – Zahlreiche Angebote zur persönlichen Weiterentwicklung
                  - listitem [ref=e82]: – Modernes Arbeitsumfeld, kollegiales Miteinander und Gestaltungsfreiraum
                  - listitem [ref=e83]: – Betriebliches Gesundheitsmanagement
                - paragraph [ref=e84]: Haben wir Ihr Interesse geweckt? Dann freuen wir uns über Ihre Online-Bewerbung. Bei Fragen kontaktieren Sie bitte Andrea Hammrich.
                - paragraph [ref=e85]:
                  - strong [ref=e86]: One Passion. Many Opportunities.
