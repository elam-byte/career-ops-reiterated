      - generic [ref=e69]:
        - heading "Job Description" [level=2] [ref=e70]
        - paragraph [ref=e71]: Aufgaben
        - list [ref=e72]:
          - listitem [ref=e73]:
            - paragraph [ref=e74]: Als Projektleiter für die Abwicklung von internationalen Kundenprojekten für dezentrale Energieanlagen (nukleare Anwendung - Kernkraftwerke) leiten Sie das Projektteam und sind verantwortlich für Qualität, Termine und Kosten der ihnen anvertrauten Projekte
          - listitem [ref=e75]:
            - paragraph [ref=e76]: Zu Ihren Aufgaben zählt sowohl die Projektplanung und -Steuerung als auch das interne und externe Reporting sowie das Risiko- und Change-Management
          - listitem [ref=e77]:
            - paragraph [ref=e78]: Sie sind das Gesicht zum Kunden in Bezug auf alle relevanten Projektthemen und verantworten die Koordination mit dem Auftraggeber, den ausführenden Firmen, sowie den beteiligten Unternehmensbereichen
          - listitem [ref=e79]:
            - paragraph [ref=e80]: Bei der Umsetzung projektspezifischer Kundenanforderungen unterstützen Sie bei der Systemauslegung und Ausführung (Beschaffung, Herstellung, Abnahme, Logistik, Montage und Inbetriebsetzung) und koordinieren die zuständigen Fachbereiche
          - listitem [ref=e81]:
            - paragraph [ref=e82]: In fachlicher Führung koordinieren Sie die Inbetriebnahme des Lieferumfangs gemeinsam mit dem Service, sowie den ausführenden Firmen
          - listitem [ref=e83]:
            - paragraph [ref=e84]: Sie unterstützen die Vertriebsorganisation bei der Bearbeitung von Ausschreibungsunterlagen sowie der Angebots- und Kalkulationserstellung und nehmen an Kundenverhandlungen teil
        - paragraph [ref=e85]: Qualifikationen
        - list [ref=e86]:
          - listitem [ref=e87]:
            - paragraph [ref=e88]: Erfolgreich abgeschlossenes Studium im Bereich Maschinenbau, Energietechnik, Elektrotechnik oder vergleichbare Qualifikation mit Berufserfahrung
          - listitem [ref=e89]:
            - paragraph [ref=e90]: Sehr gute Kenntnisse über Energieerzeugungssystemen oder vergleichbare Anwendungen im Anlagenbau / Kraftwerksbau / Kerntechnik / NPP
          - listitem [ref=e91]:
            - paragraph [ref=e92]: Sicherer Umgang mit MS-Office, SAP, C4S, SharePoint, Windchill
          - listitem [ref=e93]:
            - paragraph [ref=e94]: Sehr gute Deutsch- und Englischkenntnisse in Wort und Schrift, weitere Fremdsprachen von Vorteil
          - listitem [ref=e95]:
            - paragraph [ref=e96]: Konzeptionelle, kundenorientierte Grundeinstellung und sicheres Auftreten sowie auch Verhandlungsgeschick
          - listitem [ref=e97]:
            - paragraph [ref=e98]: Strukturierte, eigenständige und motivierte Arbeitsweise
          - listitem [ref=e99]:
            - paragraph [ref=e100]: Teamfähigkeit und interkulturelle Kompetenz
          - listitem [ref=e101]:
            - paragraph [ref=e102]: Flexibilität, Belastbarkeit und Bereitschaft zu Reisen
        - paragraph [ref=e103]: "Warum Rolls‑Royce Power Systems:"
        - list [ref=e104]:
          - listitem [ref=e105]:
            - paragraph [ref=e106]: Gesunde und faire Arbeitsbedingungen durch Tarifbindung (Metall- und Elektroindustrie)
          - listitem [ref=e107]:
            - paragraph [ref=e108]: Betriebseigene Krankenkasse BKK MTU für unsere Mitarbeitenden und Familienangehörigen
          - listitem [ref=e109]:
            - paragraph [ref=e110]: Umfangreiches betriebliches Gesundheitsmanagement inklusive Firmenfitnessprogramm (EGYM Wellpass)
          - listitem [ref=e111]:
            - paragraph [ref=e112]: Attraktive betriebliche Altersvorsorge – Mit uns für das Alter sparen!
          - listitem [ref=e113]:
            - paragraph [ref=e114]: Berufsunfähigkeitsversicherung – Absicherung für alle Fälle!
          - listitem [ref=e115]:
            - paragraph [ref=e116]: Mobilitätsunterstützung im Alltag – JobTicket und Jobrad
          - listitem [ref=e117]:
            - paragraph [ref=e118]: Corporate Benefits Programm – Attraktive Mitarbeiterrabatte auf zahlreiche starke Marken
        - paragraph [ref=e119]: Wir sind ein Arbeitgeber, der sich für Chancengleichheit einsetzt. Wir setzen uns für die Entwicklung einer vielfältigen Belegschaft und eines integrativen Arbeitsumfelds ein. Wir glauben, dass Menschen mit unterschiedlichen Hintergründen und Kulturen uns unterschiedliche Perspektiven geben. Und je mehr Perspektiven wir haben, desto erfolgreicher werden wir sein. Durch den Aufbau einer Kultur des Respekts und der Wertschätzung geben wir jedem, der hier arbeitet, die Möglichkeit, sein volles Potenzial auszuschöpfen.
        - heading "Ihr Ansprechpartner" [level=2] [ref=e120]
        - paragraph [ref=e121]: Wolf Singercareers@ps.rolls-royce.com
        - paragraph [ref=e122]: "Hinweis: Bitte bewerben Sie sich ausschließlich online über unser Karriereportal. Bewerbungen auf anderen Kanälen (insb. auch E-Mail) können nicht berücksichtigt werden."
        - heading "Type of Contract" [level=2] [ref=e123]
        - text: Permanent
