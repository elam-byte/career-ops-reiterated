            - strong [ref=e114]: What you bring
          - list [ref=e115]:
            - listitem [ref=e116]: Multiple years of experience in setting up and leading very large (50+ consultants) and complex SAP customer transformations to success, implementing and rolling out both private and public cloud SAP solutions, preferably at a consulting / system integration company
            - listitem [ref=e117]:
              - generic [ref=e118]: Strong track record in managing, aligning and working with various levels within a customer organization (project, business, executive) as well as different parts of large global organizations
            - listitem [ref=e119]: Master’s degree, preferably in business, engineering, computer science
            - listitem [ref=e120]: Excellent knowledge of project management, ideally PMI PgMP certified
            - listitem [ref=e121]: Excellent knowledge of state-of-the-art methodology and tools (SAP Activate, RISE methodology, SAP Integrated Toolchain, AI…)
            - listitem [ref=e122]: Excellent communication skills in both German and English
          - paragraph [ref=e123]
          - heading "Where you belong" [level=2] [ref=e124]
          - paragraph [ref=e125]: The mission of the Delivery and Program Office (DPO) MEE is to drive success of our customers' transformations across Middle and Eastern Europe (Germany, Switzerland, and Central and Eastern Europe). To achieve this, the DPO hosts four teams, including a team of SAP's most experienced Program Managers leading very large customer transformations.
          - paragraph [ref=e126]
          - paragraph [ref=e127]
          - paragraph [ref=e128]:
            - generic [ref=e129]:
              - strong [ref=e130]: Bring out your best
              - generic [ref=e131]:
                - text: SAP innovations help more than four hundred thousand customers worldwide work together more efficiently and use business insight more effectively. Originally known for leadership in enterprise resource planning (ERP) software, SAP has evolved to become a market leader in end-to-end business application software and related services for database, analytics, intelligent technologies, and experience management. As a cloud company with two hundred million users and more than one hundred thousand employees worldwide, we are purpose-driven and future-focused, with a highly collaborative team ethic and commitment to personal development. Whether connecting global industries, people, or platforms, we help ensure every challenge gets the solution it deserves. At SAP, you can bring out your best.
                - strong [ref=e132]: We win with inclusion
                - text: SAP’s culture of inclusion, focus on health and well-being, and flexible working models help ensure that everyone – regardless of background – feels included and can run at their best. At SAP, we believe we are made stronger by the unique capabilities and qualities that each person brings to our company, and we invest in our employees to inspire confidence and help everyone realize their full potential. We ultimately believe in unleashing all talent and creating a better world.
                - text: "SAP is committed to the values of Equal Employment Opportunity and provides accessibility accommodations to applicants with physical and/or mental disabilities. If you are interested in applying for employment with SAP and are in need of accommodation or special assistance to navigate our website or to complete your application, please send an e-mail with your request to Recruiting Operations Team: Careers@sap.com."
