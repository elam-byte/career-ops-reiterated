            - listitem [ref=e72]: Constant learning, skill growth, great benefits, and a team that wants you to grow and succeed
            - listitem [ref=e73]: Operate at the intersection of technology, product innovation, and executive decision-making within SAP, with direct access to the teams building the software you implement and a direct influence on how our cloud solutions evolve through real customer transformation insights.
            - listitem [ref=e74]:
              - generic [ref=e75]: Be part of a culture that values trust, flexibility, and continuous development
            - listitem [ref=e76]: Shape not only customer outcomes—but how we deliver as an organization
