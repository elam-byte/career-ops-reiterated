            - generic [ref=e56]:
              - strong [ref=e57]: We help the world run better
              - generic [ref=e58]: "At SAP, we keep it simple: you bring your best to us, and we'll bring out the best in you. We're builders touching over 20 industries and 80% of global commerce, and we need your unique talents to help shape what's next. The work is challenging – but it matters. You'll find a place where you can be yourself, prioritize your wellbeing, and truly belong. What's in it for you? Constant learning, skill growth, great benefits, and a team that wants you to grow and succeed."
          - paragraph [ref=e59]
          - paragraph [ref=e60]
          - paragraph [ref=e61]:
            - strong [ref=e63]: What you'll build
          - paragraph [ref=e64]
          - paragraph [ref=e65]: As a Strategic Program Manager (m/f/d) you will lead our largest and most complex SAP customer transformations, implementing and rolling out both private and public cloud SAP solutions. The key purpose is helping SAP customers to realize maximum business benefits from their SAP investments and innovate fast.
          - paragraph [ref=e66]
          - paragraph [ref=e67]
