            - generic [ref=e48]:
              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: The AWS Infrastructure Energy Team (IET) is seeking a results-orientated individual to join in the role of Grid Delivery Manager. In this role you will be responsible for delivering large-scale critical HV/ MV grid interconnection projects within EMEA under tight deadlines. The ideal candidate for this role will have high-level technical understanding of critical HV /MV infrastructure projects including substations, cables and overhead lines, with a minimum of 5+ years’ experience in delivering HV & MV infrastructure projects/programs from design to energization. The candidate will need to possess strong communication skills, and ability to deliver with diverse teams such as design engineering, construction, planning, environmental and real estate teams, to ensure delivery to tight timelines. Stakeholder management and weekly reporting on key project risks & issues at senior management, director and vice president level will be the candidate’s responsibility. The candidate will drive the grid infrastructure delivery program, standardize processes, develop tools for delivery executions and support financial budgeting.
                - text: AWS Infrastructure Services (AIS)
                - text: AWS Infrastructure Services owns the design, planning, delivery, and operation of all AWS global infrastructure. In other words, we’re the people who keep the cloud running. We support all AWS data centers and all of the servers, storage, networking, power, and cooling equipment that ensure our customers have continual access to the innovation they rely on. We work on the most challenging problems, with thousands of variables impacting the supply chain — and we’re looking for talented people who want to help.
                - text: You’ll join a diverse team of software, hardware, and network engineers, supply chain specialists, security experts, operations managers, and other vital roles. You’ll collaborate with people across AWS to help us deliver the highest standards for safety and security while providing seemingly infinite capacity at the lowest possible cost for our customers. And you’ll experience an inclusive culture that welcomes bold ideas and empowers you to own them to completion.
                - text: About the team
                - text: "ABOUT AWS:"
                - text: Diverse Experiences
                - text: Amazon values diverse experiences. Even if you do not meet all of the preferred qualifications and skills listed in the job description, we encourage candidates to apply. If your career is just starting, hasn’t followed a traditional path, or includes alternative experiences, don’t let it stop you from applying.
                - text: Why AWS
                - text: Amazon Web Services (AWS) is the world’s most comprehensive and broadly adopted cloud platform. We pioneered cloud computing and never stopped innovating — that’s why customers from the most successful startups to Global 500 companies trust our robust suite of products and services to power their businesses.
                - text: Work/Life Balance
                - text: We value work-life harmony. Achieving success at work should never come at the expense of sacrifices at home, which is why we strive for flexibility as part of our working culture. When we feel supported in the workplace and at home, AWS Infrastructure Services (AIS)
                - text: AWS Infrastructure Services owns the design, planning, delivery, and operation of all AWS global infrastructure. In other words, we’re the people who keep the cloud running. We support all AWS data centers and all of the servers, storage, networking, power, and cooling equipment that ensure our customers have continual access to the innovation they rely on. We work on the most challenging problems, with thousands of variables impacting the supply chain — and we’re looking for talented people who want to help.
                - text: You’ll join a diverse team of software, hardware, and network engineers, supply chain specialists, security experts, operations managers, and other vital roles. You’ll collaborate with people across AWS to help us deliver the highest standards for safety and security while providing seemingly infinite capacity at the lowest possible cost for our customers. And you’ll experience an inclusive culture that welcomes bold ideas and empowers you to own them to completion.
                - text: there’s nothing we can’t achieve in the cloud.
                - text: Inclusive Team Culture
                - text: AWS values curiosity and connection. Our employee-led and company-sponsored affinity groups promote inclusion and empower our people to take pride in what makes us unique. Our inclusion events foster stronger, more collaborative teams. Our continual innovation is fueled by the bold ideas, fresh perspectives, and passionate voices our teams bring to everything we do.
                - text: Mentorship and Career Growth
                - text: We’re continuously raising our performance bar as we strive to become Earth’s Best Employer. That’s why you’ll find endless knowledge-sharing, mentorship and other career-advancing resources here to help you develop into a better-rounded professional.
