              - heading "Technical AI-Consultant (m/w/d) Kirchdorf/Oberopfingen" [level=1] [ref=e52]:
                - generic [ref=e53]: Technical AI-Consultant (m/w/d)
                - generic [ref=e54]: Kirchdorf/Oberopfingen
              - generic [ref=e56]:
                - paragraph [ref=e57]: Sie begeistern sich für innovative KI-Lösungen und möchten die Zukunft der Arbeitswelt aktiv mitgestalten? Sie verbinden technisches Know-how mit strategischer Beratung, um KI-Lösungen in Unternehmen erfolgreich zu entwickeln und zu implementieren?
                - paragraph [ref=e58]: Wir suchen zur Verstärkung des Teams Business Support Solutions einen Technical AI-Consultant (m/w/d). In spannenden Projekten rund um das Thema KI übernehmen Sie eine Schlüsselrolle, von der Beratung bis zur Implementierung.
                - paragraph [ref=e59]:
                  - text: "Bei der Liebherr-IT Services GmbH legen wir Wert auf die Entfaltung individueller und unternehmerischer Bedürfnisse und leben daher das Flex Office: Wir arbeiten im hybriden Modell bei flexiblen Arbeitszeiten – sowohl vor Ort als auch mobil."
                  - text: "Liebherr-Interner Titel: Technical Consultant"
                - 'heading "Faszinierendes schaffen: Ihre Aufgaben" [level=2] [ref=e60]'
                - list [ref=e61]:
                  - listitem [ref=e62]: – Beratung und Entwicklung von KI-Strategien, die auf Unternehmensziele von Liebherr abgestimmt sind
                  - listitem [ref=e63]: – Analyse und Optimierung bestehender Geschäftsprozesse mithilfe von KI und im engen Austausch mit den jeweiligen Fachbereichen
                  - listitem [ref=e64]: – Implementierung von KI-Lösungen, z.B. mit AI Low Code Platforms wie Microsoft Copilot Studio oder Azure AI Foundry
                  - listitem [ref=e65]: – Integration von KI-Systemen in bestehenden IT-Landschaften
                  - listitem [ref=e66]: – Begleitung von Projekten von der Anforderungsaufnahme bis zur erfolgreichen Implementierung
                  - listitem [ref=e67]: – Kommunikation mit Fachbereichen, IT und Management
                  - listitem [ref=e68]: – Dokumentation und Übergabe von Projektergebnissen
                - 'heading "Stärken einbringen: Ihre Qualifikationen" [level=2] [ref=e69]'
                - list [ref=e70]:
                  - listitem [ref=e71]: – Abgeschlossenes Studium im Bereich Informatik, Wirtschaftsinformatik oder vergleichbare Qualifikation
                  - listitem [ref=e72]: – Fundierte Kenntnisse in AI Low Code Platform wie Microsoft Copilot, Copilot Studio und Azure AI Foundry
                  - listitem [ref=e73]: – Kenntnisse im Prompt Engineering und im Umgang mit LLMs (Large Language Models)
                  - listitem [ref=e74]: – Erfahrung im Projektmanagement und in der Zusammenarbeit mit verschiedenen Stakeholdern
                  - listitem [ref=e75]: – Sehr gute analytische und konzeptionelle Fähigkeiten
                  - listitem [ref=e76]: – Selbstständige, strukturierte und lösungsorientierte Arbeitsweise
                  - listitem [ref=e77]: – Ausgesprägte Kommunikations- und Teamfähigkeit
                  - listitem [ref=e78]: – Sehr gute Deutsch- und Entlgischkenntnisse in Wort und Schrift
                - 'heading "Freiraum nutzen: Ihre Vorteile" [level=2] [ref=e79]'
                - paragraph [ref=e80]: "Die Firmengruppe Liebherr bietet Ihnen als international erfolgreiches Familienunternehmen einen sicheren Arbeitsplatz, eine einzigartige Vielfalt an Aufgaben und spannende Entwicklungsmöglichkeiten. Werden Sie noch heute Teil unseres starken Teams und lernen Sie die Firmengruppe Liebherr als zuverlässigen Partner kennen. Profitieren Sie von diesen Benefits:"
                - list [ref=e81]:
                  - listitem [ref=e82]: – Attraktive Vergütung und Sozialleistungen
                  - listitem [ref=e83]: – Flexibles und mobiles Arbeiten
                  - listitem [ref=e84]: – Freiräume für kreatives Arbeiten
                  - listitem [ref=e85]: – Krisensicherer Arbeitsplatz
                  - listitem [ref=e86]: – Individuelle Entwicklungs- und Weiterbildungsmöglichkeiten
                  - listitem [ref=e87]: – Mitarbeitervorteile & Rabatte
                  - listitem [ref=e88]: – Gesunde & regionale Verpflegung im Betriebsrestaurant
                  - listitem [ref=e89]: – Betriebliches Gesundheitsmanagement
                  - listitem [ref=e90]: – E-Gym-Wellpass
                - paragraph [ref=e91]:
                  - text: "Machen Sie sich Ihr eigenes Bild von unserem Standort Oberopfingen:"
                  - link "Liebherr - Imagefilm Standort Oberopfingen - YouTube" [ref=e92] [cursor=pointer]:
                    - /url: https://www.youtube.com/watch?v=CriM8oAD4G4
                  - text: "und finden Sie Ihr perfektes Match in unserem Familienunternehmen:"
                  - link "Liebherr - Finde dein perfektes Match! (youtube.com)" [ref=e93] [cursor=pointer]:
                    - /url: https://www.youtube.com/watch?v=JvlAzpFl8I8&list=PLRWbihl-JTGWHZJVxWIG2FnqNcpAaZUtd&index=5
                - paragraph [ref=e94]: Bitte nutzen Sie ausschließlich die Möglichkeit zur Online-Bewerbung.
                - paragraph [ref=e95]: Haben wir Ihr Interesse geweckt? Dann freuen wir uns über Ihre Online-Bewerbung. Bei Fragen kontaktieren Sie bitte Ümit Arici.
                - paragraph [ref=e96]:
                  - strong [ref=e97]: One Passion. Many Opportunities.
