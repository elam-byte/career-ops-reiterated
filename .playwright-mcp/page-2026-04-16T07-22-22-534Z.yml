              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: At Amazon, we strive to be Earth's most customer-centric company where people can find and discover anything they want to buy online. We hire the world's brightest minds, offering them an environment in which they can relentlessly improve the experience for customers.
                - text: "The IT Services organization that supports this growth through the implementation of technology solutions including: desktop productivity tools, systems and network infrastructure, and HR/financial systems, and company-wide technology programs such as website availability and latency."
                - text: Amazon is searching for a proven and established leader to manage an IT Support team. This leader will be responsible for IT service delivery for corporate operations. This leader will be responsible to drive standardization and communication in the region and tie into IT Services initiatives, owning the needs of the internal customers
                - text: Key job responsibilities
                - text: • Directly manage a team, building an organization that can support and sustain regional growth and customer need.
                - text: • Working closely with engineering and other operations teams to incorporate customer feedback and address key support and usability concerns for customers throughout the region.
                - text: • Maintaining very high customer satisfaction and a consistently great work experience for all Amazonians, regardless of location.
                - text: • Effectively defining/analyzing metrics to drive team behavior in pursuit of goals.
                - text: • Working effectively in a cross-functional environment with legal, technical, senior management teams and site leadership.
                - text: • Traveling occasionally to meet with remote staff and customers.
                - text: • Developing and holding to Operational Excellence metrics, diving deep into the details and data to understand how our customers interact with our services and infrastructure
            - generic [ref=e51]:
