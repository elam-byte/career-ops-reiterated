          - paragraph [ref=e55]:
            - strong [ref=e56]: We help the world run better
            - generic [ref=e57]: "At SAP, we keep it simple: you bring your best to us, and we'll bring out the best in you. We're builders touching over 20 industries and 80% of global commerce, and we need your unique talents to help shape what's next. The work is challenging – but it matters. You'll find a place where you can be yourself, prioritize your wellbeing, and truly belong. What's in it for you? Constant learning, skill growth, great benefits, and a team that wants you to grow and succeed."
          - paragraph [ref=e58]
          - paragraph [ref=e59]
          - paragraph [ref=e60]:
            - strong [ref=e62]: All SAP locations in Germany as for example Walldorf (close to Mannheim/Heidelberg), Hamburg, Berlin, Ratingen (close to Düsseldorf), Eschborn (close to Frankfurt), Gerlingen (close to Stuttgart), Garching (close to München) are possible.
          - paragraph [ref=e63]
          - paragraph [ref=e64]:
            - strong [ref=e66]: "What you’ll build:"
          - paragraph [ref=e67]
          - paragraph [ref=e68]:
            - text: We are looking for a Senior AI Architect (f/m/d) to join our AI Strategy & Advisory team and help drive SAP Business AI at our customers. You will act as a E2E advisor (f/m/d) for AI topics, support strategic AI initiatives, and translate ideas into production-ready solutions that deliver measurable business value.
            - text: As an AI Architect (f/m/d) - you play an important role in bringing one of the most important technologies of our time - Artificial Intelligence - into action at customers and for SAP’s strategy.
          - paragraph [ref=e69]
          - paragraph [ref=e70]:
            - strong [ref=e72]: "Take responsibility for supporting customers’ SAP Business AI journey:"
          - paragraph [ref=e73]
          - list [ref=e74]:
            - listitem [ref=e75]: Help establish yourself as a key contact for AI-related topics at customers
            - listitem [ref=e76]: Support the design of SAP Business AI architectures aligned with customer business strategy
            - listitem [ref=e77]: Develop AI Strategies for our customers
            - listitem [ref=e78]: Translate strategic AI initiatives into measurable business value
            - listitem [ref=e79]: Support our customers in discovering effective ways to apply AI to create real value
            - listitem [ref=e80]: Contribute to developing AI roadmaps, conducting ideation workshops, AI hackathons and participate in architecture discussions
            - listitem [ref=e81]: Design AI-powered systems that automate manual processes and optimize engineering workflows
            - listitem [ref=e82]: Provide guidance & know-how on Artificial Intelligence – Machine Learning, Generative AI, Agentic AI
            - listitem [ref=e83]: Stay up-to-date with the latest AI technology developments and advise on potential business benefits
            - listitem [ref=e84]: AI is a team sport - work closely with cross-functional teams (e.g. AI product management, go-to market teams, consulting) to leverage the full potential
            - listitem [ref=e85]: Actively contribute to knowledge sharing and team enablement – supporting AI adoption across our region while engaging with global, international customers
          - paragraph [ref=e86]:
            - strong [ref=e88]: "What you bring:"
          - paragraph [ref=e89]
          - list [ref=e90]:
            - listitem [ref=e91]: Bachelor’s or master’s degree in Artificial Intelligence, Computer Science, Information Systems, or a related field
            - listitem [ref=e92]: Several years of experience in an AI focused role
            - listitem [ref=e93]: Solid knowledge of Artificial Intelligence & IT architectures - Agentic AI & Generative AI
            - listitem [ref=e94]: Passion for AI and digital transformation, with a strong desire to learn and grow in how these technologies drive business success
            - listitem [ref=e95]: Demonstrated ability to automate complex workflows using AI agents, with understanding of agentic patterns
            - listitem [ref=e96]: Good experience with SAP and understanding of its architecture (e.g. SAP Business AI, SAP Business Technology Platform, GenAI Hub)
            - listitem [ref=e97]: Ability to work in a fast-paced, team-oriented environment
            - listitem [ref=e98]: Good business acumen & professional communication skills
            - listitem [ref=e99]: Excellent communication skills in both German and English
            - listitem [ref=e100]: Strong problem-solving mindset with ability to identify high-impact automation opportunities and translate them into working solutions
          - paragraph [ref=e101]
