            - heading "Dein Impact:" [level=3] [ref=e59]
            - generic [ref=e60]:
              - paragraph [ref=e61]: Als Cloud Engineering Manager / Cloud Architekt (m/w/d) gestaltest du skalierbare ,sichere und cloud-native Lösungen, führst Teams, berätst Kunden und treibst Cloud-Transformationen voran, um einen messbaren und nachhaltigen Mehrwert zu kreieren.
              - list [ref=e62]:
                - listitem [ref=e63]:
                  - strong [ref=e64]: "Leadership & Delivery:"
                  - text: Führe cross-funktionale Teams beim Design, Aufbau und Betrieb skalierbarer Cloud-Lösungen auf AWS, Azure, GCP oder anderen Cloud-Plattformen.
                - listitem [ref=e65]:
                  - strong [ref=e66]: "Client Advisory:"
                  - text: Berate Kunden zu Cloud-Strategien, Modernisierung, Architektur und DevOps-Praktiken, um Geschäftsziele effizient zu erreichen.
                - listitem [ref=e67]:
                  - strong [ref=e68]: "Solution Architecture & Innovation:"
                  - text: Verantworte Cloud- und Datenplattformen von Konzept bis Deployment und treibe Best Practices, Standards und wiederverwendbare Lösungsansätze voran.
                - listitem [ref=e69]:
                  - strong [ref=e70]: "Team Development & Mentoring:"
                  - text: Coache und entwickle Cloud-Engineering-Teams, indem du Zusammenarbeit und eine Innovationskultur förderst und maßgeblich zur Talententwicklung beiträgst.
                - listitem [ref=e71]:
                  - strong [ref=e72]: "Business Development:"
                  - text: Entwickle Go-to-Market-Strategien, unterstütze Pre-Sales-Aktivitäten und trage zu Angeboten, Pitches und Kundenmeetings bei.
