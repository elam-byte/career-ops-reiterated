      - generic [ref=e47]:
        - generic [ref=e54]:
          - paragraph [ref=e55]:
            - strong [ref=e56]: We help the world run better
            - generic [ref=e57]: "At SAP, we keep it simple: you bring your best to us, and we'll bring out the best in you. We're builders touching over 20 industries and 80% of global commerce, and we need your unique talents to help shape what's next. The work is challenging – but it matters. You'll find a place where you can be yourself, prioritize your wellbeing, and truly belong. What's in it for you? Constant learning, skill growth, great benefits, and a team that wants you to grow and succeed."
          - paragraph [ref=e58]
          - strong [ref=e60]: What you'll build
          - generic [ref=e61]: As a development manager (f/m/d), you will be at the forefront of enabling enterprise-grade generative AI. You will lead the team owning the SAP Cloud SDK for AI, ensuring our products provide a world-class experience for developers building the next generation of AI-powered SAP applications.
          - generic [ref=e62]: You will work with a highly skilled team that is based in Potsdam, Germany. As leader of our team, you will have the unique opportunity to shape the tools that thousands of developers use to build AI-powered SAP applications — working at the intersection of developer experience, SDK engineering, generative AI, and enterprise software.
          - generic [ref=e63]: Our team fosters a dynamic and innovative work environment with an open-minded and flat-hierarchy culture within the global enterprise business. We offer room for experimentation, embrace promising new ideas, and are open to change less fruitful habits. We are a multi-cultural team with diverse personalities and bright, fact-driven minds that like to challenge each other to ultimately achieve the best possible outcome for our customers.
          - strong [ref=e65]: What you bring
          - list [ref=e66]:
            - listitem [ref=e67]:
              - generic [ref=e68]: Proven leadership track record as a manager or in a similar leading role
            - listitem [ref=e69]:
              - generic [ref=e70]: "Strong technical background with hands-on coding experience in at least two of our core languages: Python, Java, or TypeScript"
            - listitem [ref=e71]:
              - generic [ref=e72]: Very good experience in coaching agile teams within a cloud engineering environment
            - listitem [ref=e73]:
              - generic [ref=e74]: Background in computer science, software engineering, or a related field
            - listitem [ref=e75]:
              - generic [ref=e76]: Fluent English language skills, both written and spoken
          - generic [ref=e78]: Beneficial
          - list [ref=e79]:
            - listitem [ref=e80]:
              - generic [ref=e81]: Good knowledge of SAP
            - listitem [ref=e82]:
              - generic [ref=e83]: Good German knowledge
          - strong [ref=e85]: Where you belong
          - generic [ref=e86]: Our team develops the official SAP Cloud SDK for AI — the Python, Java, and TypeScript libraries that make SAP AI Core, the Generative AI Hub, and the Orchestration Service accessible to developers building enterprise AI applications. We are an integral part of the SAP Business AI area within SAP, driven by our mission to provide best-in-class developer experiences that empower customers to harness the full potential of generative AI in their business processes.
          - paragraph [ref=e87]: "#SAPAICareers #SAPBusinessAICareers"
          - paragraph [ref=e88]
          - paragraph [ref=e89]:
            - strong [ref=e90]: Bring out your best
            - generic [ref=e91]:
              - text: SAP innovations help more than four hundred thousand customers worldwide work together more efficiently and use business insight more effectively. Originally known for leadership in enterprise resource planning (ERP) software, SAP has evolved to become a market leader in end-to-end business application software and related services for database, analytics, intelligent technologies, and experience management. As a cloud company with two hundred million users and more than one hundred thousand employees worldwide, we are purpose-driven and future-focused, with a highly collaborative team ethic and commitment to personal development. Whether connecting global industries, people, or platforms, we help ensure every challenge gets the solution it deserves. At SAP, you can bring out your best.
              - strong [ref=e92]: We win with inclusion
              - text: SAP’s culture of inclusion, focus on health and well-being, and flexible working models help ensure that everyone – regardless of background – feels included and can run at their best. At SAP, we believe we are made stronger by the unique capabilities and qualities that each person brings to our company, and we invest in our employees to inspire confidence and help everyone realize their full potential. We ultimately believe in unleashing all talent and creating a better world.
              - text: "SAP is committed to the values of Equal Employment Opportunity and provides accessibility accommodations to applicants with physical and/or mental disabilities. If you are interested in applying for employment with SAP and are in need of accommodation or special assistance to navigate our website or to complete your application, please send an e-mail with your request to Recruiting Operations Team: Careers@sap.com."
