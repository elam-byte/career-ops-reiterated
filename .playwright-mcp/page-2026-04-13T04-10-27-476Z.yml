      - main [ref=e42]:
        - generic [ref=e43]:
          - img "Senior IT Project Management Officer - Corporate IT PMO (m/w/d)" [ref=e47]
          - generic [ref=e49]:
            - generic [ref=e50]:
              - heading "Senior IT Project Management Officer - Corporate IT PMO (m/w/d) Kirchdorf/Oberopfingen" [level=1] [ref=e52]:
                - generic [ref=e53]: Senior IT Project Management Officer - Corporate IT PMO (m/w/d)
                - generic [ref=e54]: Kirchdorf/Oberopfingen
              - generic [ref=e56]:
                - paragraph [ref=e57]: "Bei der Liebherr-IT Services GmbH legen wir Wert auf die Entfaltung individueller und unternehmerischer Bedürfnisse und leben daher das Flex Office: Wir arbeiten im hybriden Modell bei flexiblen Arbeitszeiten – sowohl vor Ort als auch mobil."
                - paragraph [ref=e58]: "Interner Titel: Project Management Officer (m/w/d)"
                - paragraph [ref=e59]: "Globale IT-Projekte strategisch begleiten und Standards prägen: In dieser Rolle übernehmen Sie eine zentrale Funktion innerhalb der Corporate IT. Sie begleiten Project Manager:innen übergreifend, stellen die konsequente Anwendung globaler Standards sicher und treiben die Weiterentwicklung des IT Project Management Frameworks aktiv voran. Dabei agieren Sie als Sparringspartner:in für IT Project Management und IT Project Portfolio Management."
                - 'heading "Faszinierendes schaffen: Ihre Aufgaben" [level=2] [ref=e60]'
                - list [ref=e61]:
                  - listitem [ref=e62]: – Begleitung von Project Manager:innen über den gesamten Projektlebenszyklus – von der Initiierung bis zum Abschluss – zur Sicherstellung erfolgreicher Projektumsetzungen innerhalb der Corporate IT
                  - listitem [ref=e63]: – Eigenverantwortliche Prüfung und Qualitätssicherung von Projektdokumenten sowie Beratung der Project Manager:innen und Projektteams bei der Anwendung globaler PM-Standards zur Sicherstellung von Konsistenz, Transparenz und hoher Projektqualität.
                  - listitem [ref=e64]: – Schnittstellenfunktion zum IT Project Portfolio Management sowie zum operativen Projektmanagement, inklusive Abstimmung, Entscheidungsunterstützung und proaktiver Kommunikation über Projekte hinweg
                  - listitem [ref=e65]: – Moderation von Workshops und Meetings, Aufbereitung von Entscheidungsvorlagen sowie Mitwirkung an der Weiterentwicklung des globalen IT PM Frameworks
                  - listitem [ref=e66]: – Weiternentwicklung und Standardisierung der PM-Toollandschaft und Dashboards, um Project Manager:innen praxisnah zu unterstützen und die Effizienz der Werkzeuge zu steigern
                  - listitem [ref=e67]: – Gestaltung und Ausbau eines internationalen und gruppenübergreifenden PM-Netzwerks innerhalb der Corporate IT durch Austausch von Best Practices, sowie Ableitung von Lessons Learned zur nachhaltigen Steigerung der Projektmanagement-Reife
                - 'heading "Stärken einbringen: Ihre Qualifikationen" [level=2] [ref=e68]'
                - list [ref=e69]:
                  - listitem [ref=e70]: – Abgeschlossenes Studium in Informatik oder einer verwandten Disziplin
                  - listitem [ref=e71]: – Mehrjährige fundierte Erfahrung im IT-Projektmanagement (mindestens 5 Jahre)
                  - listitem [ref=e72]: – Tiefgehendes Verständnis von Projektmanagement-Methoden, Governance-Strukturen und Portfolio-Management-Prozessen
                  - listitem [ref=e73]: – Erfahrung im Umgang mit Projektportfoliomanagement-Tools und Reporting-Strukturen
                  - listitem [ref=e74]: – Herausragende organisatorische Fähigkeiten und eine strukturierte Arbeitsweise
                  - listitem [ref=e75]: – Hohe Beratungskompetenz sowie souveränes Auftreten gegenüber internationalen Stakeholdern und Management
                  - listitem [ref=e76]: – Fähigkeit, komplexe Projektdokumentationen und -unterlagen zu erstellen, zu verwalten und für Entscheidungsprozesse aufzubereiten
                  - listitem [ref=e77]: – Sehr gute Englischkenntnisse von Vorteil
                  - listitem [ref=e78]: – Projektmanagement-Zertifizierung (z. B. IPMA, PMI, PRINCE2 oder vergleichbar) wünschenswert
                - 'heading "Freiraum nutzen: Ihre Vorteile" [level=2] [ref=e79]'
                - paragraph [ref=e80]: "Die Firmengruppe Liebherr bietet Dir als international erfolgreiches Familienunternehmen einen sicheren Arbeitsplatz, eine einzigartige Vielfalt an Aufgaben und spannende Entwicklungsmöglichkeiten. Werde noch heute Teil unseres starken Teams und lerne die Firmengruppe Liebherr als zuverlässigen Partner kennen. Profitiere von diesen Benefits:"
                - list [ref=e81]:
                  - listitem [ref=e82]: – Attraktive Vergütung und Sozialleistungen
                  - listitem [ref=e83]: – Flexibles und mobiles Arbeiten
                  - listitem [ref=e84]: – Freiräume für kreatives Arbeiten
                  - listitem [ref=e85]: – Krisensicherer Arbeitsplatz
                  - listitem [ref=e86]: – Individuelle Entwicklungs- und Weiterbildungsmöglichkeiten
                  - listitem [ref=e87]: – Mitarbeitervorteile & Rabatte
                  - listitem [ref=e88]: – Gesunde & regionale Verpflegung im Betriebsrestaurant
                  - listitem [ref=e89]: – Betriebliches Gesundheitsmanagement
                  - listitem [ref=e90]: – E-Gym-Wellpass
                - paragraph [ref=e91]:
                  - text: "Mache Dir Dein eigenes Bild von unserem Standort Oberopfingen:"
                  - link "Liebherr - Imagefilm Standort Oberopfingen - YouTube" [ref=e92] [cursor=pointer]:
                    - /url: https://www.youtube.com/watch?v=CriM8oAD4G4
                  - text: "und finde Dein perfektes Match in unserem Familienunternehmen:"
                  - link "Liebherr - Finde dein perfektes Match! (youtube.com)" [ref=e93] [cursor=pointer]:
                    - /url: https://www.youtube.com/watch?v=JvlAzpFl8I8&list=PLRWbihl-JTGWHZJVxWIG2FnqNcpAaZUtd&index=5
                - paragraph [ref=e94]: Bitte nutze ausschließlich die Möglichkeit zur Online-Bewerbung.
                - paragraph [ref=e95]: Haben wir Ihr Interesse geweckt? Dann freuen wir uns über Ihre Online-Bewerbung. Bei Fragen kontaktieren Sie bitte Ümit Arici.
                - paragraph [ref=e96]:
                  - strong [ref=e97]: One Passion. Many Opportunities.
