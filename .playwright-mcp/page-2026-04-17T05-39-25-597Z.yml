    - main [ref=e43]:
      - generic [ref=e47]:
        - generic [ref=e54]:
          - paragraph [ref=e55]:
            - strong [ref=e56]:
              - generic [ref=e57]: Wir helfen die Welt zu verbessern
            - generic [ref=e58]:
              - text: "Bei SAP halten wir es einfach: Du bringst dein Bestes mit, und wir holen das Beste aus dir heraus."
              - text: Wir sind Macher, die über 20 Branchen und 80 % des weltweiten Handels beeinflussen – und wir brauchen deine einzigartigen Talente, um die Zukunft mitzugestalten.
              - text: Die Arbeit ist herausfordernd – aber sie zählt. Du findest bei uns einen Ort, an dem du du selbst sein kannst, dein Wohlbefinden an erster Stelle steht und du wirklich dazugehört.
              - text: Was hast du davon? Ständiges Lernen, Weiterentwicklung deiner Fähigkeiten, großartige Zusatzleistungen und ein Team, das möchte, dass du wächst und erfolgreich bist.
          - paragraph [ref=e59]
          - paragraph [ref=e60]
          - paragraph [ref=e61]
          - paragraph [ref=e62]:
            - strong [ref=e64]: Alle SAP Standorte in Deutschland wie z.B. Hamburg, Berlin, Ratingen (bei Düsseldorf), Eschborn (bei Frankfurt), Gerlingen (bei Stuttgart), Garching (bei München), etc. sind möglich.
          - paragraph [ref=e65]
          - paragraph [ref=e66]:
            - strong [ref=e68]: "Was du mitgestaltest:"
          - paragraph [ref=e69]
          - list [ref=e70]:
            - listitem [ref=e71]: Planung sämtlicher Projektaktivitäten wie Zeitplanung, Projektorganisation, Ressourcenplanung, Maßnahmen zur Qualitätssicherung und zur Ermittlung des Projektstatus
            - listitem [ref=e72]: Steuerung der finanziellen Aspekte eines Projektes wie Kostenplanung, Überwachung und Einhaltung des Projektbudgets und der Projektprofitabilität
            - listitem [ref=e73]: Durchführung des Projektmanagements mit Hilfe der SAP Projektmanagement-Methodik auf Basis von PMI
            - listitem [ref=e74]: Koordination der Zusammenarbeit mit den beteiligten externen Parteien wie Kunden oder Partner-Anbietern
            - listitem [ref=e75]: Anleitung des Implementierungsteams mit Koordination aller beteiligten SAP-internen Parteien wie SAP Near- und Offshore-Center, anderen SAP-Organisationseinheiten sowie der SAP-Entwicklung zur Sicherstellung der Gesamtabstimmung
            - listitem [ref=e76]: Stakeholdermanagement der unterschiedlichen internen und externen Ansprechpartner
            - listitem [ref=e77]: Umsetzung von Change-Management Prozessen
          - paragraph [ref=e78]
          - paragraph [ref=e79]:
            - strong [ref=e81]: "Was du mitbringst:"
          - paragraph [ref=e82]
          - list [ref=e83]:
            - listitem [ref=e84]: Studienabschluss im Bereich (Wirtschafts)-Informatik, Betriebswirtschaft oder vergleichbar
            - listitem [ref=e85]: Relevante mehrjährige Beratungserfahrung im Energy Umfeld, davon mindestens 50% im SAP Umfeld
            - listitem [ref=e86]: Nachweisbare Erfolge in der Leitung von Projekten mit mindestens mittlerer Komplexität und Größe (> 1.000 PT)
            - listitem [ref=e87]: Erfahrungen in der Zusammenarbeit mit Offshore/Nearshore-Ressourcen, externen Dienstleistern sowie in der Steuerung von virtuellen Teams
            - listitem [ref=e88]: Projektmanagement Methodik Zertifizierung wie z.B. PMI PMP, PRINCE2, etc. sind von Vorteil, ebenso Kenntnisse von agilen Methoden
            - listitem [ref=e89]: Souveräne Kommunikations- sowie Präsentationsfähigkeiten in Deutsch und Englisch (jeweils fließend in Wort und Schrift)
            - listitem [ref=e90]: Kenntnisse der Energiewirtschaftsbranche von Vorteil
          - paragraph [ref=e91]
          - paragraph [ref=e92]:
            - strong [ref=e94]: "Wo du hingehörst:"
          - paragraph [ref=e95]
          - paragraph [ref=e96]: Unser Team betreut Kunden aus der Energiewirtschaft in Deutschland. Insbesondere die größeren mittelständischen Versorger, spezialisierte Rechenzentren für Versorger und die Großkunden in diesem Marktsegment sind unsere Kunden. Wir unterstützen sie in ihren End-to-End-Prozessen in ihrer gesamten IT-Architektur, den SAP-Anwendungen und deren Integration und helfen ihnen, sich zu intelligenten Unternehmen zu entwickeln.
          - paragraph [ref=e97]
          - paragraph [ref=e98]
          - paragraph [ref=e99]:
            - generic [ref=e100]:
              - generic [ref=e101]: "#CSS_Germany"
              - generic [ref=e102]: "#CSS_MEE"
              - generic [ref=e103]: "#SAPServices"
            - text: "#LI-AS9"
          - paragraph [ref=e104]:
            - generic [ref=e105]:
              - strong [ref=e106]:
                - generic [ref=e107]: Gib dein Bestes
              - generic [ref=e108]:
                - text: SAP-Innovationen helfen mehr als vierhunderttausend Kunden weltweit, effizienter zusammenzuarbeiten und Business Insight effektiver zu nutzen. SAP war ursprünglich für seine Führungsrolle in der ERP-Software (Enterprise Resource Planning) bekannt und hat sich zu einem Marktführer für End-to-End-Software für Geschäftsanwendungen und zugehörige Services für Datenbank, Analyse, intelligente Technologien und Erfahrungsmanagement entwickelt. Als Cloud-Unternehmen mit zweihundert Millionen Benutzern und mehr als einhunderttausend Mitarbeitern weltweit sind wir zielgerichtet und zukunftsorientiert, mit einer äußerst kollaborativen Teamethik und Engagement für die persönliche Entwicklung. Unabhängig davon, ob wir globale Branchen, Menschen oder Plattformen miteinander verbinden, stellen wir sicher, dass jede Herausforderung die Lösung erhält, die sie verdient. Bei SAP kannst du dein Bestes geben.
                - strong [ref=e109]: Wir gewinnen durch Inklusion
                - text: SAPs Kultur der Inklusion, der Fokus auf Gesundheit und Wohlbefinden sowie flexible Arbeitsmodelle stellen sicher, dass sich alle
                - emphasis [ref=e110]
                - text: – unabhängig vom Hintergrund – einbezogen fühlt und ihr Bestes geben können.
                - text: Bei SAP sind wir überzeugt davon, dass uns die einzigartigen Fähigkeiten und Eigenschaften, die jede Person mitbringt, stärker machen. Deshalb investieren wir in die Menschen bei SAP, um Selbstvertrauen zu stärken und allen zu helfen, ihr volles Potenzial zu entfalten.
                - text: Unser Ziel ist es, alle Talente zu fördern und eine bessere Welt zu schaffen.
          - paragraph [ref=e111]:
            - strong [ref=e113]
          - paragraph [ref=e114]:
            - generic [ref=e115]:
              - strong [ref=e116]:
                - generic [ref=e117]: Chancengleichheit und Barrierefreiheit
              - generic [ref=e118]:
                - text: SAP bekennt sich zu den Werten der Chancengleichheit am Arbeitsplatz und bietet im Fall von mit körperlichen und/oder geistigen Beeinträchtigungen barrierefreie Unterstützung bei der Bewerbung.
                - text: "Wenn du dich für eine Stelle bei SAP bewerben möchtest und Unterstützung oder besondere Hilfe beim Navigieren auf unserer Website oder beim Ausfüllen deiner Bewerbung benötigst, sende bitte eine E-Mail mit deiner Anfrage an das Recruiting Operations Team: Careers@sap.com."
                - text: Anfragen auf angemessene Vorkehrungen werden im Einzelfall geprüft.
