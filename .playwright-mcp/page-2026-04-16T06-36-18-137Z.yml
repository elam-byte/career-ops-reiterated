            - generic [ref=e48]:
              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: Join Amazon's Payment Products Team to support the development and enhancement of co-branded credit card offerings in Germany.
                - text: As the Product Manager for DE CBCC, you will own critical business operations including monthly, quarterly, and weekly business reviews, manage strategic initiatives with our banking partner, and drive customer-facing improvements that enhance the cardmember experience.
                - text: Key job responsibilities
                - text: You will own the end-to-end preparation and delivery of internal business reviews for the DE CBCC program, synthesize data from Finance, Marketing, and Business Intelligence teams to create compelling narratives that inform leadership decisions and drive program improvements. Additionally, you will lead the preparation and execution of Steer Committee meetings with our banking partner, ensuring alignment on strategic priorities and operational performance.
                - text: You will co-own the Know Your Customer review process for Germany, working closely with legal, compliance, and risk teams to ensure our program meets all regulatory requirements while maintaining a seamless customer experience.
                - text: Customer Experience and Product Development by leading the revamp and launch of a new Existing Cardmember page for DE CBCC, transforming how current cardmembers engage with their credit card benefits and account management. This initiative requires deep customer insights, collaboration with UX and marketing teams, and data-driven decision.
                - text: You will manage all Vendor Funds Installments offers in partnership with retail teams, optimizing promotional strategies that drive card acquisition and usage while delivering value to customers. You will also own the coordination of KSE across the EU CBCC, ensuring alignment between teams and partners.
            - generic [ref=e51]:
