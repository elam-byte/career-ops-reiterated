      - heading "Data Architect Global Program Lead (f/m/d)" [level=1] [ref=e33]
      - generic [ref=e36]: Consulting and Professional Services
      - link "Apply now »" [ref=e41] [cursor=pointer]:
        - /url: /talentcommunity/apply/1374987633/?locale=en_US
    - main [ref=e43]:
      - generic [ref=e47]:
        - generic [ref=e54]:
          - paragraph [ref=e55]:
            - strong [ref=e56]: We help the world run better
            - generic [ref=e57]: "At SAP, we keep it simple: you bring your best to us, and we'll bring out the best in you. We're builders touching over 20 industries and 80% of global commerce, and we need your unique talents to help shape what's next. The work is challenging – but it matters. You'll find a place where you can be yourself, prioritize your wellbeing, and truly belong. What's in it for you? Constant learning, skill growth, great benefits, and a team that wants you to grow and succeed."
          - paragraph [ref=e58]
          - paragraph [ref=e59]
          - paragraph [ref=e60]:
            - strong [ref=e62]: "What you’ll build:"
          - paragraph [ref=e63]
          - paragraph [ref=e64]: As Data Architect Global Program Lead (f/m/d), you will manage the implementation of global Data Architect initiatives, ensuring strong alignment between global strategy and regional execution. Reporting to the Global Head of Data Architect Advisory, you will drive structured program governance across Strategy, Enablement, and Value Realization while enabling two-way communication with regional teams in the Global Delivery Hub to continuously adapt and fine-tune execution based on feedback.
          - paragraph [ref=e65]: This is a global program leadership role focused on operating model design, stakeholder alignment, communication, and performance steering at scale.
          - paragraph [ref=e66]
          - paragraph [ref=e67]: "Key Responsibilities:"
          - paragraph [ref=e68]
          - list [ref=e69]:
            - listitem [ref=e70]: You will lead the Governance of the global Data Architect program by defining and continuously refining the operating framework that enables consistent execution worldwide. This includes establishing role definitions and RACI models, clarifying deliverables and effort expectations, aligning resource and hiring plans, and supporting funding acquisition. You will define customer qualification criteria and engagement standards to ensure high-value impact, while owning the global tools strategy and support model to enable scalable and efficient program delivery across regions.
            - listitem [ref=e71]: You will oversee Performance Steering by defining KPIs, reporting structures, and measurable success criteria for the program. Through regular regional steering cadences, you will ensure alignment on priorities, targets, and execution quality. You will track performance and business impact, proactively address gaps, and establish structured product and field feedback loops that support continuous improvement and help influence SAP’s broader Data and AI evolution.
            - listitem [ref=e72]: You will support Enablement and Communication to ensure capability building and alignment at scale. This includes leading global certification paths and structured learning journeys, strengthening university alliances and early talent pipelines, and enabling the broader SAP ecosystem across Sales, Enterprise Architecture, Services, and partners. You will ensure consistent field communication through clear messaging, playbooks, and updates, while governing the Data Architect onboarding journey and amplifying global success stories to reinforce best practices and measurable outcomes.
          - paragraph [ref=e73]
          - paragraph [ref=e74]: "This role provides a unique opportunity to operationalize and scale SAP’s global Data Architect program. You will:"
          - paragraph [ref=e75]
          - list [ref=e76]:
            - listitem [ref=e77]: Drive global alignment between strategy and execution across regions
            - listitem [ref=e78]: Influence how SAP enables, measures, and scales its Data Architect capabilities worldwide
            - listitem [ref=e79]: Work closely with senior leaders across SAP’s ecosystem
            - listitem [ref=e80]: Shape a high-impact global program with measurable and lasting business outcomes
          - paragraph [ref=e81]
          - paragraph [ref=e82]:
            - strong [ref=e84]: "What you bring:"
          - paragraph [ref=e85]:
            - strong [ref=e87]
          - list [ref=e88]:
            - listitem [ref=e89]: "Global Program Leadership Expertise: Strong experience aligning senior leadership teams and driving execution in complex, matrix environments."
            - listitem [ref=e90]: "Strategic and Governance Excellence: Proven experience designing operating models, governance structures, and decision frameworks at global scale. Ability to translate strategic vision into structured execution frameworks, clear standards, and measurable outcomes."
            - listitem [ref=e91]: "Stakeholder and Change Leadership: Strong communication and influencing skills, with storytelling skills to simplify complex topics and drive alignment."
            - listitem [ref=e92]: "Data and AI Business Acumen: Understanding of SAP’s Data and AI strategy and enterprise data transformation concepts, with the ability to guide program direction at a strategic level"
            - listitem [ref=e93]: "Performance Management Mindset: Experience defining KPIs, managing performance cadences, and driving accountability across distributed teams"
          - paragraph [ref=e94]
          - paragraph [ref=e95]: "Must-Have Requirements:"
          - paragraph [ref=e96]:
            - strong [ref=e98]
          - list [ref=e99]:
            - listitem [ref=e100]: Several years of experience in global program management, transformation leadership, or strategy execution within SAP or enterprise software environments
            - listitem [ref=e101]: Strong understanding of SAP’s Data and AI portfolio and enterprise data transformation landscapes
            - listitem [ref=e102]: Experience working in cross-functional environments spanning Development, Sales, Enterprise Architecture, and Services
            - listitem [ref=e103]: Demonstrated ability to drive structured governance, funding alignment, and resource planning at global scale
            - listitem [ref=e104]: Exceptional executive communication and stakeholder management skills
            - listitem [ref=e105]: Excellent German and English language skills required
          - paragraph [ref=e106]
          - paragraph [ref=e107]: "Nice-to-Have Requirements:"
          - paragraph [ref=e108]:
            - strong [ref=e110]
          - list [ref=e111]:
            - listitem [ref=e112]: Experience building global enablement or certification frameworks
            - listitem [ref=e113]: Background in performance steering, KPI governance, or value realization programs
            - listitem [ref=e114]: Familiarity with hyperscaler ecosystems and partner enablement models
            - listitem [ref=e115]: Experience in large-scale organizational change initiatives
          - paragraph [ref=e116]
          - paragraph [ref=e117]:
            - strong [ref=e119]: "Where you belong:"
          - paragraph [ref=e120]
          - paragraph [ref=e121]: The SAP Data and AI Adoption Team is dedicated to driving customer adoption success and accelerating measurable business outcomes. We bring SAP’s most innovative data and AI frameworks and solutions to life by enabling customers to fully realize the value of their data through SAP Business Data Cloud and the broader Data and AI portfolio. By fostering collaboration, innovation, and a strong customer-centric mindset, we ensure that strategy turns into sustained adoption, tangible impact, and long-term value realization.
          - paragraph [ref=e122]
          - paragraph [ref=e123]: "#DA26"
          - paragraph [ref=e124]
          - paragraph [ref=e125]:
            - strong [ref=e126]: Bring out your best
            - generic [ref=e127]:
              - text: SAP innovations help more than four hundred thousand customers worldwide work together more efficiently and use business insight more effectively. Originally known for leadership in enterprise resource planning (ERP) software, SAP has evolved to become a market leader in end-to-end business application software and related services for database, analytics, intelligent technologies, and experience management. As a cloud company with two hundred million users and more than one hundred thousand employees worldwide, we are purpose-driven and future-focused, with a highly collaborative team ethic and commitment to personal development. Whether connecting global industries, people, or platforms, we help ensure every challenge gets the solution it deserves. At SAP, you can bring out your best.
              - strong [ref=e128]: We win with inclusion
              - text: SAP’s culture of inclusion, focus on health and well-being, and flexible working models help ensure that everyone – regardless of background – feels included and can run at their best. At SAP, we believe we are made stronger by the unique capabilities and qualities that each person brings to our company, and we invest in our employees to inspire confidence and help everyone realize their full potential. We ultimately believe in unleashing all talent and creating a better world.
              - text: "SAP is committed to the values of Equal Employment Opportunity and provides accessibility accommodations to applicants with physical and/or mental disabilities. If you are interested in applying for employment with SAP and are in need of accommodation or special assistance to navigate our website or to complete your application, please send an e-mail with your request to Recruiting Operations Team: Careers@sap.com."
