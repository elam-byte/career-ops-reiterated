      - generic [ref=e759]:
        - paragraph [ref=e760]: Deloitte bietet führende Prüfungs- und Beratungsleistungen in den Bereichen Audit & Assurance, Tax & Legal, Consulting und Advisory für nahezu 90% der Fortune Global 500®-Unternehmen und Tausende von privaten Unternehmen an. Wir liefern innovative Denkansätze, lösen komplexe Herausforderungen und ermöglichen nachhaltiges Wachstum. Gleichzeitig eröffnen wir hervorragende Karrierechancen für unsere rund 470.000 Mitarbeitenden weltweit. Ganz gleich, ob BWL oder MINT – Diversity fördert Innovation durch unterschiedliche Sichtweisen und Charaktere. Die Zeiten, bei Deloitte einzusteigen, waren nie spannender.
